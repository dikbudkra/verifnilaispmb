name: Build APK SPMB

on: 
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Persiapan Mesin (Node & Java)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Buat Cangkang Aplikasi
        run: |
          # Inisialisasi project kosong dan install library pembungkus web
          npm init -y
          npm install @capacitor/cli @capacitor/core @capacitor/android
          
          # Membuat file yang otomatis mengarahkan aplikasi ke Web GAS Anda
          mkdir www
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0; url=https://dikbudkra.github.io/verifnilaispmb" /></head><body style="display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;">Memuat Aplikasi SPMB...</body></html>' > www/index.html
          
          # Merakit struktur aplikasi Android
          npx cap init "Verif SPMB" id.go.karanganyar.spmb --web-dir www
          npx cap add android
          npx cap sync android

      - name: Kompilasi APK (Build)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Simpan Hasil APK
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Verif-SPMB
          path: android/app/build/outputs/apk/debug/app-debug.apk
