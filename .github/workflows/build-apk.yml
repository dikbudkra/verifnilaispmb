name: Build APK SPMB

on: 
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Persiapan Mesin (Node)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Buat Cangkang Aplikasi
        run: |
          # Inisialisasi project dan install library
          npm init -y
          npm install @capacitor/cli @capacitor/core @capacitor/android
          
          # Buat folder kosong sebagai syarat
          mkdir www
          echo 'Memuat...' > www/index.html
          
          # Inisialisasi Capacitor
          npx cap init "Verif SPMB" id.go.karanganyar.spmb --web-dir www
          
          # Memasukkan link SPMB langsung ke konfigurasi inti aplikasi
          cat << 'EOF' > capacitor.config.json
          {
            "appId": "id.go.karanganyar.spmb",
            "appName": "Verif SPMB",
            "webDir": "www",
            "server": {
              "url": "https://dikbudkra.github.io/verifnilaispmb",
              "cleartext": true
            }
          }
          EOF
          
          # Merakit struktur aplikasi Android
          npx cap add android
          npx cap sync android

      - name: Kompilasi APK (Build)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Simpan Hasil APK
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Verif-SPMB
          path: android/app/build/outputs/apk/debug/app-debug.apk
